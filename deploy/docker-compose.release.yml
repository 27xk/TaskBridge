services:
  web:
    image: nginx:1.28-alpine
    container_name: taskbridge-web
    restart: unless-stopped
    ports:
      - "${TASKBRIDGE_WEB_BIND:-8080}:80"
    volumes:
      - ../web:/usr/share/nginx/html:ro
      - ./nginx.web.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      api:
        condition: service_healthy
    networks:
      taskbridge_internal:
        ipv4_address: 172.30.27.10

  api:
    image: ${TASKBRIDGE_BACKEND_IMAGE:-ghcr.io/27xk/taskbridge:latest}
    container_name: taskbridge-api
    restart: unless-stopped
    env_file:
      - .env
    environment:
      TRUSTED_PROXY_IPS: ${TRUSTED_PROXY_IPS:-172.30.27.10}
    ports:
      - "${TASKBRIDGE_API_BIND:-8000}:8000"
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      taskbridge_internal:
        ipv4_address: 172.30.27.20

  mysql:
    image: mysql:8.4
    container_name: taskbridge-mysql
    restart: unless-stopped
    env_file:
      - .env
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - taskbridge_mysql:/var/lib/mysql
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -u$${MYSQL_USER} -p$${MYSQL_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      taskbridge_internal:
        ipv4_address: 172.30.27.30

  redis:
    image: redis:7.4-alpine
    container_name: taskbridge-redis
    restart: unless-stopped
    volumes:
      - taskbridge_redis:/data
    command: ["redis-server", "--appendonly", "yes"]
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      taskbridge_internal:
        ipv4_address: 172.30.27.40

volumes:
  taskbridge_mysql:
  taskbridge_redis:

networks:
  taskbridge_internal:
    ipam:
      config:
        - subnet: 172.30.27.0/24
