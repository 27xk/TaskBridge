name: Bug 报告
description: 报告可复现的问题、构建失败或同步异常。
title: "[Bug] "
labels:
  - bug
body:
  - type: dropdown
    id: area
    attributes:
      label: 影响范围
      options:
        - Backend
        - Android
        - Windows Desktop
        - Docker / Deploy
        - GitHub Actions
        - Documentation
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: 问题描述
      description: 简要说明发生了什么。
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: 复现步骤
      placeholder: |
        1. ...
        2. ...
        3. ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: 期望结果
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: 实际结果
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: 日志或截图
      description: 构建失败请贴出失败 step 和红色错误块。
      render: text

