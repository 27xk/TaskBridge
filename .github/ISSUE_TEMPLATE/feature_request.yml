name: 功能建议
description: 提出新功能、体验优化或文档改进。
title: "[Feature] "
labels:
  - enhancement
body:
  - type: dropdown
    id: area
    attributes:
      label: 影响范围
      options:
        - Backend
        - Android
        - Windows Desktop
        - Widget
        - Floating Window
        - Docker / Deploy
        - Documentation
    validations:
      required: true
  - type: textarea
    id: problem
    attributes:
      label: 你遇到的问题
      description: 从用户视角说明为什么需要这个功能。
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 期望方案
      description: 描述你希望 TaskBridge 如何解决这个问题。
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 备选方案
      description: 如果你考虑过其他方案，可以写在这里。

